  <line x1="80" y1="312" x2="740" y2="312" stroke="#2ecc71" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.3"/>
  <text x="743" y="315" class="lbl" fill="#27ae60" font-size="8">7h ★</text>

