  <line x1="80" y1="240" x2="740" y2="240" stroke="#ebebeb" stroke-width="0.5"/>
  <line x1="80" y1="219" x2="740" y2="219" stroke="#ebebeb" stroke-width="0.5"/>
  <line x1="80" y1="197" x2="740" y2="197" stroke="#ebebeb" stroke-width="0.5"/>
  <line x1="80" y1="176" x2="740" y2="176" stroke="#ebebeb" stroke-width="0.5"/>
  <line x1="80" y1="154" x2="740" y2="154" stroke="#ebebeb" stroke-width="0.5"/>
