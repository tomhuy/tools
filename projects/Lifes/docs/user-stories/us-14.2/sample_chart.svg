  <circle cx="357" cy="240" r="7" fill="#e74c3c"/>
  <circle cx="384" cy="240" r="7" fill="#e74c3c"/>
  <circle cx="410" cy="240" r="7" fill="#e74c3c"/>
  <circle cx="436" cy="133" r="7" fill="#2ecc71"/>
  <circle cx="463" cy="133" r="7" fill="#2ecc71"/>
  <circle cx="489" cy="133" r="7" fill="#2ecc71"/>
