  <!-- Day 13: 4.5h → top=362, h=10 -->
  <rect x="401" y="362" width="18" height="10" fill="#1abc9c" opacity="0.4" rx="2"/>
  <text x="410" y="358" text-anchor="middle" class="lbl" fill="#c0392b" font-size="8">4.5h</text>
  <!-- Day 15: 7.5h → top=302, h=70 -->
  <rect x="454" y="302" width="18" height="70" fill="#1abc9c" rx="2"/>
  <text x="463" y="298" text-anchor="middle" class="lbl" fill="#16a085" font-size="8">7.5h</text>
  <!-- Day 16: 6.5h → top=322, h=50 -->
  <rect x="480" y="322" width="18" height="50" fill="#1abc9c" rx="2"/>
  <!-- Day 17: 6h → top=332, h=40 -->
  <rect x="507" y="332" width="18" height="40" fill="#1abc9c" rx="2"/>
  <!-- Day 18: 7h → top=312, h=60 -->
  <rect x="533" y="312" width="18" height="60" fill="#1abc9c" rx="2"/>
  <!-- Day 19: 5.5h → top=342, h=30 -->
