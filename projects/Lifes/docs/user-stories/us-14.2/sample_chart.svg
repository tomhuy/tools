  <circle cx="146" cy="60" r="4" fill="#27ae60"/>
  <circle cx="225" cy="60" r="4" fill="#27ae60"/>
  <circle cx="278" cy="60" r="5" fill="#27ae60" stroke="#1e8449" stroke-width="1.2"/>
