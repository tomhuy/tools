  <!-- Days 20–23: 6.5h → top=322, h=50 -->
  <rect x="586" y="322" width="18" height="50" fill="#1abc9c" rx="2"/>
  <rect x="612" y="322" width="18" height="50" fill="#1abc9c" rx="2"/>
  <rect x="639" y="322" width="18" height="50" fill="#1abc9c" rx="2"/>
  <rect x="665" y="322" width="18" height="50" fill="#1abc9c" rx="2"/>
  <!-- Day 24: 9h → top=272, h=100 -->
  <rect x="691" y="272" width="18" height="100" fill="#16a085" rx="2"/>
  <text x="700" y="286" text-anchor="middle" class="lbl" fill="#ffffff" font-size="8" font-weight="bold">9h</text>
  <!-- Day 25: 7h → top=312, h=60 -->
  <rect x="718" y="312" width="18" height="60" fill="#1abc9c" rx="2"/>

  <!-- ====== X AXIS ====== -->
  <line x1="80" y1="377" x2="740" y2="377" stroke="#ddd" stroke-width="1"/>
  <text x="93"  y="389" text-anchor="middle" class="lbl" fill="#bdc3c7">1</text>
  <text x="199" y="389" text-anchor="middle" class="lbl" fill="#bdc3c7">5</text>
  <text x="331" y="389" text-anchor="middle" class="lbl" fill="#e74c3c" font-weight="bold">10</text>
  <text x="436" y="389" text-anchor="middle" class="lbl" fill="#27ae60" font-weight="bold">14</text>
  <text x="595" y="389" text-anchor="middle" class="lbl" fill="#d4ac0d" font-weight="bold">20</text>
  <text x="727" y="389" text-anchor="middle" class="lbl" fill="#f39c12" font-weight="bold">25</text>

  <!-- Today marker -->
  <line x1="727" y1="52" x2="727" y2="377" stroke="#f39c12" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>
  <text x="727" y="400" text-anchor="middle" font-size="8" fill="#f39c12" opacity="0.8">hôm nay</text>

  <!-- ====== LEGEND ====== -->
  <circle cx="88"  cy="420" r="4" fill="#27ae60"/>
  <text x="96"  y="424" class="lbl" fill="#7f8c8d">Học tâm lý học</text>
  <circle cx="187" cy="420" r="4" fill="#8e44ad"/>
  <text x="195" y="424" class="lbl" fill="#7f8c8d">Học tư duy</text>
  <circle cx="264" cy="420" r="5" fill="#e74c3c"/>
  <text x="273" y="424" class="lbl" fill="#7f8c8d">Crisis D</text>
  <circle cx="320" cy="420" r="5" fill="#2ecc71"/>
  <text x="329" y="424" class="lbl" fill="#7f8c8d">Ổn B</text>
  <circle cx="367" cy="420" r="5" fill="#f1c40f"/>
  <text x="376" y="424" class="lbl" fill="#7f8c8d">Trung B-/C</text>
  <rect x="440" y="416" width="12" height="8" fill="#1abc9c" rx="1"/>
  <text x="456" y="424" class="lbl" fill="#7f8c8d">Giờ ngủ</text>
  <line x1="507" y1="420" x2="524" y2="420" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.65"/>
  <text x="529" y="424" class="lbl" fill="#e74c3c">Lag 2 ngày</text>
  <line x1="590" y1="420" x2="610" y2="420" stroke="#27ae60" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="615" y="424" class="lbl" fill="#7f8c8d">Mục tiêu 7h ngủ</text>
</svg>
