  <text x="74" y="355" text-anchor="end" class="lbl" fill="#95a5a6">5h</text>
  <text x="74" y="335" text-anchor="end" class="lbl" fill="#95a5a6">6h</text>
  <text x="74" y="315" text-anchor="end" class="lbl" fill="#95a5a6">7h</text>
  <text x="74" y="295" text-anchor="end" class="lbl" fill="#95a5a6">8h</text>
  <text x="74" y="275" text-anchor="end" class="lbl" fill="#95a5a6">9h</text>

