<svg width="780" height="440" viewBox="0 0 780 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: bold 14px 'Segoe UI',Arial,sans-serif; fill:#2c3e50; }
      .sub   { font: 10px 'Segoe UI',Arial,sans-serif; fill:#95a5a6; }
      .lbl   { font: 9px 'Segoe UI',Arial,sans-serif; }
      .sec   { font: bold 10px 'Segoe UI',Arial,sans-serif; fill:#7f8c8d; letter-spacing:1px; }
      .ann   { font: italic 9px 'Segoe UI',Arial,sans-serif; }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#e74c3c" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="440" fill="#ffffff" rx="8"/>
  <rect x="1" y="1" width="778" height="438" fill="none" stroke="#ecf0f1" stroke-width="1" rx="8"/>

  <!-- TITLE -->
  <text x="390" y="25" text-anchor="middle" class="title">Cảm xúc · Giấc ngủ · Học tập — April 2026</text>
  <text x="390" y="41" text-anchor="middle" class="sub">Tác nhân — Phản ứng — Phục hồi</text>

  <!-- ====== VERTICAL EVENT LINES (span toàn chart, y=52–242) ====== -->
  <!-- Học tâm lý học: days 1,3,6,8,13,20,22 -->
  <line x1="93"  y1="52" x2="93"  y2="242" stroke="#27ae60" stroke-width="1"   opacity="0.18"/>
  <line x1="146" y1="52" x2="146" y2="242" stroke="#27ae60" stroke-width="1"   opacity="0.18"/>
  <line x1="225" y1="52" x2="225" y2="242" stroke="#27ae60" stroke-width="1"   opacity="0.18"/>
  <line x1="278" y1="52" x2="278" y2="242" stroke="#27ae60" stroke-width="1.8" opacity="0.4"/>
  <line x1="410" y1="52" x2="410" y2="242" stroke="#27ae60" stroke-width="1"   opacity="0.18"/>
  <line x1="595" y1="52" x2="595" y2="242" stroke="#27ae60" stroke-width="1"   opacity="0.18"/>
  <line x1="648" y1="52" x2="648" y2="242" stroke="#27ae60" stroke-width="1"   opacity="0.18"/>
  <!-- Học tư duy: days 2,7,9,23 -->
