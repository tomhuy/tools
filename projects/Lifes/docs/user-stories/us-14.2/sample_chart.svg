  <line x1="252" y1="52" x2="252" y2="242" stroke="#8e44ad" stroke-width="1"   opacity="0.18"/>
  <line x1="304" y1="52" x2="304" y2="242" stroke="#8e44ad" stroke-width="1.8" opacity="0.4"/>
  <line x1="674" y1="52" x2="674" y2="242" stroke="#8e44ad" stroke-width="1"   opacity="0.18"/>

