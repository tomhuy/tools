  <text x="74" y="200" text-anchor="end" class="lbl" fill="#e67e22">C</text>
  <text x="74" y="179" text-anchor="end" class="lbl" fill="#f39c12">C+</text>
  <text x="74" y="157" text-anchor="end" class="lbl" fill="#d4ac0d">B-</text>
  <text x="74" y="136" text-anchor="end" class="lbl" fill="#27ae60">B</text>
  <text x="74" y="114" text-anchor="end" class="lbl" fill="#1e8449">B+</text>
  <text x="74" y="93"  text-anchor="end" class="lbl" fill="#1a5276">A</text>

