                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
                .replace(/^---$/gm, '<hr>')
                .replace(/^\d+\. (.+)$/gm, (m, p) => `<li>${p}</li>`)
                .replace(/^[-*] (.+)$/gm, (m, p) => `<li>${p}</li>`)
                .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(?!<[hbuolp])(.+)$/gm, '<p>$1</p>')
                .replace(/<p><\/p>/g, '');
        }

        // ── MARKDOWN COMMANDS ──
        function mdCmd(cmd) {
            if (isPreview) { togglePreview(); }
            const ta = document.getElementById('note-content');
            const start = ta.selectionStart;
            const end = ta.selectionEnd;
            const sel = ta.value.slice(start, end);
            const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
            let replacement = '';
            let offset = 0;

            switch (cmd) {
                case 'bold': replacement = `**${sel || 'text'}**`; offset = sel ? 0 : 2; break;
                case 'italic': replacement = `*${sel || 'text'}*`; offset = sel ? 0 : 1; break;
                case 'code': replacement = `\`${sel || 'code'}\``; offset = sel ? 0 : 1; break;
                case 'h1': { const line = ta.value.slice(lineStart, end || lineStart + 1); ta.value = ta.value.slice(0, lineStart) + '# ' + line.replace(/^#+\s?/, '') + ta.value.slice(end || lineStart + line.length); ta.focus(); onContentChange(); return; }
                case 'h2': { const line = ta.value.slice(lineStart, end || lineStart + 1); ta.value = ta.value.slice(0, lineStart) + '## ' + line.replace(/^#+\s?/, '') + ta.value.slice(end || lineStart + line.length); ta.focus(); onContentChange(); return; }
                case 'h3': { const line = ta.value.slice(lineStart, end || lineStart + 1); ta.value = ta.value.slice(0, lineStart) + '### ' + line.replace(/^#+\s?/, '') + ta.value.slice(end || lineStart + line.length); ta.focus(); onContentChange(); return; }
                case 'ul': replacement = `\n- ${sel || 'item'}`; offset = sel ? 0 : 2; break;
                case 'ol': replacement = `\n1. ${sel || 'item'}`; offset = sel ? 0 : 3; break;
                case 'quote': replacement = `\n> ${sel || 'quote'}`; offset = sel ? 0 : 2; break;
                case 'hr': replacement = '\n---\n'; offset = 0; break;
            }
            ta.setRangeText(replacement, start, end, 'end');
            if (!sel) { ta.selectionStart = ta.selectionEnd = start + offset + (replacement.length - (sel.length || 0) - offset * 2); }
            ta.focus();
            autoResizeTA(ta);
            onContentChange();
        }

        function closeEditor() {
            currentNoteId = null;
            document.getElementById('editor-main').style.display = 'none';
            document.getElementById('empty-state').style.display = 'flex';
            document.getElementById('statusbar').style.display = 'none';
            document.querySelectorAll('.note-card').forEach(el => el.classList.remove('active'));
        }

        // ── KEYBOARD SHORTCUTS ──
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('modal-overlay').classList.contains('show')) { closeNewNoteModal(); return; }
                if (document.getElementById('detail-popup').classList.contains('open')) { closeDetailPopup(); return; }
                if (currentNoteId) { closeEditor(); return; }
            }
            if ((e.ctrlKey || e.metaKey)) {
                if (e.key === 'b') { e.preventDefault(); mdCmd('bold'); }
                if (e.key === 'i') { e.preventDefault(); mdCmd('italic'); }
                if (e.key === 'e') { e.preventDefault(); mdCmd('code'); }
                if (e.key === 'n') { e.preventDefault(); openNewNoteModal(); }
                if (e.key === 'p') { e.preventDefault(); togglePreview(); }
            }
        });

        // ── CONTEXT MENU ──
        function showCtxMenu(e, id) {
            e.preventDefault();
            ctxTargetId = id;
            const menu = document.getElementById('ctx-menu');
            menu.classList.add('show');
            menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
            menu.style.top = Math.min(e.clientY, window.innerHeight - 160) + 'px';
        }

        function showCtxMenuForNav(e, item, secId) {
            e.preventDefault();
            // nav rename on double click only
        }

        document.addEventListener('click', () => document.getElementById('ctx-menu').classList.remove('show'));

        function ctxAction(action) {
            const note = notes.find(n => n.id === ctxTargetId);
            if (!note) return;
            if (action === 'open') openNote(note.id);
            if (action === 'duplicate') {
                const dup = { ...note, id: nextId++, title: note.title + ' (copy)', modified: new Date() };
                notes.unshift(dup);
                renderNoteList(); renderSidebar();
            }
            if (action === 'delete') {
                notes = notes.filter(n => n.id !== ctxTargetId);
                if (currentNoteId === ctxTargetId) {
                    currentNoteId = null;
                    document.getElementById('editor-main').style.display = 'none';
                    document.getElementById('empty-state').style.display = 'flex';
                    document.getElementById('statusbar').style.display = 'none';
                }
                renderNoteList(); renderSidebar();
            }
            if (action === 'rename') {
                const card = document.querySelector(`.note-card[data-id="${ctxTargetId}"]`);
                if (card) { openNote(note.id); setTimeout(() => { const t = document.getElementById('note-title'); t.focus(); t.select(); }, 100); }
            }
        }

        function deleteCurrentNote() {
            if (!currentNoteId) return;
            ctxTargetId = currentNoteId;
            ctxAction('delete');
        }

        // ── NEW NOTE ──
        const ALL_TAGS = ['tâm lý học', 'design', 'journal', 'ideas', 'GTD', 'habit', 'đọc sách', 'coding'];

        function openNewNoteModal() {
            selectedTags = [];
            document.getElementById('modal-note-title').value = '';
            const tagsEl = document.getElementById('modal-tags');
            tagsEl.innerHTML = ALL_TAGS.map(t => `<button class="modal-tag-opt" onclick="toggleModalTag(this,'${t}')">${t}</button>`).join('');
            document.getElementById('modal-overlay').classList.add('show');
            setTimeout(() => document.getElementById('modal-note-title').focus(), 100);
        }

        function toggleModalTag(btn, tag) {
            btn.classList.toggle('sel');
            if (btn.classList.contains('sel')) selectedTags.push(tag);
            else selectedTags = selectedTags.filter(t => t !== tag);
        }

        function closeNewNoteModal() { document.getElementById('modal-overlay').classList.remove('show'); }
        function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeNewNoteModal(); }

        function createNote() {
            const title = document.getElementById('modal-note-title').value.trim() || 'Ghi chú mới';
            const note = {
                id: nextId++,
                title,
                content: `# ${title}\n\n`,
                tags: [...selectedTags],
                section: currentSection === 'all' || currentSection === 'inbox' ? null : currentSection,
                starred: false,
                modified: new Date(),
            };
            notes.unshift(note);
            closeNewNoteModal();
            renderNoteList(); renderSidebar();
            openNote(note.id);
            setTimeout(() => { const ta = document.getElementById('note-content'); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }, 100);
        }

        // ── ADD NAV ITEM ──
        function addNavItem(secId) {
            const label = prompt('Tên mục mới:');
            if (!label) return;
            const sec = navConfig.sections.find(s => s.id === secId);
            if (sec) {
                sec.items.push({ id: label.toLowerCase().replace(/\s+/g, '-'), label, icon: '📁', color: 'amber' });
                renderSidebar();
            }
        }

        // ── FILTER & SORT ──
        function filterNotes(q) { renderNoteList(q); }
        function toggleSort() { sortAsc = !sortAsc; renderNoteList(); }

        // ── EXPORT ──
        function exportNote() {
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            const blob = new Blob([note.content], { type: 'text/markdown' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = note.title.replace(/[^a-z0-9\u00C0-\u024F\s]/gi, '_') + '.md';
            a.click();
        }

        // ── THEME ──
        function setTheme(theme) {
            document.documentElement.classList.remove('sepia');
            if (theme === 'sepia') document.documentElement.classList.add('sepia');
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
            document.getElementById('td-' + theme).classList.add('active');
        }

        // ── SIDEBAR TOGGLE ──
        function toggleSidebar() {
            const sb = document.querySelector('.sidebar');
            sb.style.display = sb.style.display === 'none' ? '' : 'none';
        }

        // ── INIT ──
        renderSidebar();
        selectSection('all', 'Tất cả');
    </script>
</body>
