<div class="laputa-host" [class.sepia]="isSepia">
  <div class="app">
    <!-- Sidebar Trigger Zone (Hidden when sidebar is open) -->
    <div class="sidebar-trigger" *ngIf="!noteService.isSidebarOpen()" (click)="toggleSidebar()" title="Mở Sidebar">
      <div class="trigger-icon">
        <svg viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M2 7h10M2 10.5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
    </div>

    <app-laputa-sidebar *ngIf="noteService.isSidebarOpen()"></app-laputa-sidebar>
    <app-laputa-note-list (openNewNote)="openNewNoteModal()"></app-laputa-note-list>
    <app-laputa-editor></app-laputa-editor>
  </div>

  <!-- Sidebar trigger (visible when sidebar is closed) -->
  <div class="sidebar-trigger" *ngIf="!noteService.isSidebarOpen()" (click)="toggleSidebar()">
    <button class="trigger-btn" title="Mở sidebar">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="2" width="12" height="1.5" rx=".75" fill="currentColor" />
        <rect x="1" y="6" width="8" height="1.5" rx=".75" fill="currentColor" />
        <rect x="1" y="10" width="10" height="1.5" rx=".75" fill="currentColor" />
      </svg>
    </button>
  </div>

  <!-- New note modal -->
  <div class="modal-overlay" [class.show]="isNewNoteModalOpen" (click)="closeNewNoteModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-title">Ghi chú mới</div>
      <input class="modal-input" [(ngModel)]="newNoteTitle" placeholder="Tiêu đề ghi chú..."
        (keydown.enter)="createNote()">
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Tags</div>
      <div class="modal-row">
        <button *ngFor="let tag of noteService.ALL_TAGS" class="modal-tag-opt"
          [class.sel]="selectedTags.includes(tag)" (click)="toggleModalTag(tag)">
          {{ tag }}
        </button>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" (click)="closeNewNoteModal()">Huỷ</button>
        <button class="modal-create" (click)="createNote()">Tạo</button>
      </div>
    </div>
  </div>
</div>
