<aside class="sidebar">
  <div class="sidebar-top">
    <span class="app-name">Laputa</span>
    <button class="sidebar-icon-btn" title="Ẩn sidebar" (click)="toggleSidebar()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="2" width="12" height="1.5" rx=".75" fill="currentColor" />
        <rect x="1" y="6" width="8" height="1.5" rx=".75" fill="currentColor" />
        <rect x="1" y="10" width="10" height="1.5" rx=".75" fill="currentColor" />
      </svg>
    </button>
  </div>
  <div class="sidebar-search">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3" />
      <line x1="8.5" y1="8.5" x2="11" y2="11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
    </svg>
    <input type="text" placeholder="Tìm kiếm..." [ngModel]="noteService.searchQuery()" (input)="onSearch($event)">
  </div>
  <div class="theme-switcher">
    <span class="theme-label">Theme</span>
    <div class="theme-dot theme-dot-dark" [class.active]="noteService.theme() === 'dark'" (click)="setTheme('dark')" title="Dark"></div>
    <div class="theme-dot theme-dot-sepia" [class.active]="noteService.theme() === 'sepia'" (click)="setTheme('sepia')" title="Warm Sepia"></div>
  </div>
  
  <div class="sidebar-scroll" id="sidebar-nav">
    <!-- Pinned -->
    <ng-container *ngFor="let item of noteService.navConfig().pinned">
      <div class="nav-item" [class.active]="noteService.currentSection() === item.id" (click)="selectSection(item.id)">
        <svg *ngIf="isSvgIcon(item.icon)" class="nav-icon" viewBox="0 0 14 14" fill="none" [innerHTML]="getNavSvg(item.icon)"></svg>
        <span *ngIf="!isSvgIcon(item.icon)" class="nav-icon" [style.color]="getColor(item.color)">{{ item.icon }}</span>
        
        <span class="nav-label">{{ item.label }}</span>
        
        <span class="nav-count" *ngIf="noteService.getCountForSection(item.id) > 0">{{ noteService.getCountForSection(item.id) }}</span>
        <span class="nav-badge" *ngIf="item.badge">{{ item.badge }}</span>
      </div>
    </ng-container>

    <!-- Sections -->
    <ng-container *ngFor="let sec of noteService.navConfig().sections">
      <div class="nav-section">
        <div class="nav-section-header">
          <span class="nav-section-label">{{ sec.label }}</span>
          <button class="nav-add" (click)="addNavItem(sec)" title="Thêm">+</button>
        </div>
        <div class="nav-item" *ngFor="let item of sec.items" [class.active]="noteService.currentSection() === item.id" (click)="selectSection(item.id)">
          <svg *ngIf="isSvgIcon(item.icon)" class="nav-icon" viewBox="0 0 14 14" fill="none" [innerHTML]="getNavSvg(item.icon)"></svg>
          <span *ngIf="!isSvgIcon(item.icon)" class="nav-icon" [style.color]="getColor(item.color)">{{ item.icon }}</span>
          
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-count" *ngIf="noteService.getCountForSection(item.id) > 0">{{ noteService.getCountForSection(item.id) }}</span>
        </div>
      </div>
    </ng-container>
  </div>
</aside>
