<div class="page-container">
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="menu-toggle">
        <i class="icon-menu"></i>
      </button>
      <h1 class="page-title">Monthly Calendar</h1>
    </div>

    <div class="toolbar-right">
      <div class="toolbar-actions">
        <div class="dropdown-wrapper">
          <button class="action-btn secondary" (click)="toggleMonthPicker()">
            Chọn tháng <span class="chevron-down">▼</span>
          </button>
          
          @if (showMonthPicker()) {
            <div class="dropdown-menu month-picker">
              <div class="dropdown-header">Chọn các tháng muốn xem</div>
              <div class="month-list">
                @for (m of months; track m.month) {
                  <label class="month-item">
                    <input 
                      type="checkbox" 
                      [checked]="isMonthSelected(m.month, m.year)"
                      (change)="onMonthToggle(m.month, m.year)">
                    <span class="month-label">{{ m.label }}</span>
                  </label>
                }
              </div>
            </div>
          }
        </div>

        <div class="dropdown-wrapper">
          <button class="action-btn secondary" (click)="toggleTagPicker()">
            Tags <span class="chevron-down">▼</span>
          </button>

          @if (showTagPicker()) {
            <div class="dropdown-menu tag-picker">
              <div class="dropdown-header">Chọn Tag để lọc</div>
              <div class="tag-list">
                @for (tag of service.tags(); track tag.id) {
                  <label class="tag-item">
                    <input type="checkbox">
                    <span class="color-dot" [style.backgroundColor]="tag.color"></span>
                    <span class="tag-label">{{ tag.name }}</span>
                  </label>
                } @empty {
                  <div class="empty-msg">Chưa có tag nào</div>
                }
              </div>
              <div class="dropdown-footer">
                <button class="manage-tags-link" (click)="onManageTags()">
                  Quản lý Tags...
                </button>
              </div>
            </div>
          }
        </div>

        <button class="action-btn primary" (click)="onAddTopic()">
          <span class="plus">+</span> Thêm chủ đề
        </button>
        <div class="mode-select-container">
          <select 
            class="mode-select" 
            [value]="displayMode()"
            (change)="onModeSelectChange($event)">
            <option value="gantt">Gantt</option>
            <option value="dot">Dot</option>
            <option value="pure-dot">Pure Dot</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <div class="scroll-content">
    <app-monthly-grid
      [topics]="topics()"
      [childrenByParent]="childrenByParent()"
      [selectedMonths]="selectedMonths()"
      [displayMode]="displayMode()"
      [today]="today()"
      (topicClick)="onTopicClick($event)"
      (phaseClick)="onPhaseClick($event)">
    </app-monthly-grid>
  </div>
</div>

@if (showTopicEditor()) {
  <app-topic-editor
    [topic]="editingTopic()"
    (save)="onEditorSave($event)"
    (delete)="onEditorDelete($event)"
    (cancel)="onEditorCancel()">
  </app-topic-editor>
}

@if (showTagManager()) {
  <app-tag-management
    (close)="showTagManager.set(false)">
  </app-tag-management>
}
