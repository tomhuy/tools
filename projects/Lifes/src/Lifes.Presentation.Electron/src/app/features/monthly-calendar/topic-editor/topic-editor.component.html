<div class="modal-backdrop" (click)="cancel.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2>{{ isEditMode() ? 'Chỉnh sửa Chủ đề' : 'Thêm Chủ đề mới' }}</h2>
    </header>

    <form [formGroup]="topicForm" (ngSubmit)="onSubmit()" class="modal-form">
      <div class="form-row header-row">
        <div class="form-group title-group">
          <label for="title">Tiêu đề</label>
          <input type="text" id="title" formControlName="title">
        </div>
        <div class="form-group order-group">
          <label for="order">Thứ tự</label>
          <input type="number" id="order" formControlName="order" min="0">
        </div>
      </div>

      <div class="form-row date-row">
        <div class="form-group">
          <label for="startDate">Ngày bắt đầu</label>
          <input type="date" id="startDate" formControlName="startDate">
        </div>
        <div class="form-group">
          <label for="endDate">Ngày kết thúc</label>
          <input type="date" id="endDate" formControlName="endDate">
        </div>
      </div>

      <div class="form-group tag-section">
        <label>Gán Tags</label>
        <div class="tag-selector">
          @for (tag of tags(); track tag.id) {
            <label class="tag-item">
              <input type="radio" [value]="tag.id" formControlName="tagId">
              <span class="tag-badge">
                <span class="tag-dot" [style.background-color]="tag.color"></span>
                {{ tag.name }}
              </span>
            </label>
          }
          <label class="tag-item no-tag">
            <input type="radio" [value]="null" formControlName="tagId">
            <span class="tag-badge">Không tag</span>
          </label>
        </div>
      </div>

      <div class="form-group color-section">
        <label class="color-label">
          Màu đại diện Topic 
          <span class="color-preview" [style.background-color]="topicForm.get('color')?.value"></span>
        </label>
        <div class="color-grid">
          @for (c of presetColors; track c) {
            <div 
              class="color-swatch" 
              [style.background-color]="c"
              [class.active]="topicForm.get('color')?.value === c"
              (click)="topicForm.get('color')?.setValue(c)">
            </div>
          }
        </div>
      </div>

      <footer class="modal-footer">
        @if (isEditMode()) {
          <button type="button" class="btn btn-danger-text" (click)="onDelete()">Xóa</button>
        }
        <div class="spacer"></div>
        <button type="button" class="btn btn-cancel" (click)="cancel.emit()">Hủy bỏ</button>
        <button type="submit" class="btn btn-save" [disabled]="topicForm.invalid">
          {{ isEditMode() ? 'Lưu thay đổi' : 'Lưu thông tin' }}
        </button>
      </footer>
    </form>
  </div>
</div>
